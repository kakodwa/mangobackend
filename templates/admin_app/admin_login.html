<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Theme Colors */
            --mango-orange: #FF9F1C;
            --mango-orange-hover: #E78A00;
            --mango-light: #FFF4E5;
            
            --leaf-green: #2E7D32;
            --leaf-green-hover: #1B5E20;
            --leaf-light: #E8F5E9;
            
            /* Backgrounds & Neutrals */
            --bg-body: #F4F6F8;
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --border-color: #E2E8F0;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Login Card Container */
        .login-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header / Brand Branding Area */
        .login-header {
            background-color: var(--leaf-light);
            padding: 40px 30px 30px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        /* Decorative top accent line */
        .login-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--mango-orange) 0%, var(--leaf-green) 100%);
        }

        .brand-logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--leaf-green);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .brand-logo span {
            color: var(--mango-orange);
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Form Area */
        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input Container with Icons */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: var(--white);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* Focus State Custom Styling */
        .form-input:focus {
            border-color: var(--leaf-green);
            box-shadow: 0 0 0 4px var(--leaf-light);
        }

        .form-input:focus + i {
            color: var(--leaf-green);
        }

        /* Password Visibility Toggle */
        .toggle-password {
            position: absolute;
            right: 16px;
            left: auto !important;
            cursor: pointer;
            color: var(--text-muted);
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        /* Bottom helper row */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            accent-color: var(--leaf-green);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--mango-orange);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: var(--mango-orange-hover);
            text-decoration: underline;
        }

        /* Login Button Styling */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--leaf-green);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background-color: var(--leaf-green-hover);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Footer Info */
        .login-footer {
            padding: 0 30px 30px 30px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="brand-logo">
                <i class="fa-solid fa-shield-halved"></i> Market<span>Admin</span>
            </div>
            <p class="login-subtitle">Management Control Center Portal</p>
        </div>

        <form class="login-form" action="{% url 'admin_app:admin_login' %}" method="POST">
    {% csrf_token %}

    {% if messages %}
        <div style="margin-bottom: 20px; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; background-color: #FCE8E6; color: #E74C3C; border: 1px solid #FADBD8;">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
    {% endif %}

    <div class="form-group">
        <label class="form-label" for="username">Admin Identity Identifier</label>
        <div class="input-wrapper">
            <input type="text" id="username" name="username" class="form-input" placeholder="Enter username or email" required autocomplete="username">
            <i class="fa-solid fa-user"></i>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label" for="password">Security Password</label>
        <div class="input-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter security passphrase" required autocomplete="current-password">
            <i class="fa-solid fa-lock"></i>
            <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
        </div>
    </div>

    <div class="form-actions">
        <label class="remember-me">
            <input type="checkbox" name="remember" value="true"> Remember session
        </label>
        <a href="#" class="forgot-password">Trouble signing in?</a>
    </div>

    <button type="submit" class="btn-login">
        Secure Log In <i class="fa-solid fa-arrow-right"></i>
    </button>
</form>

        <div class="login-footer">
            Authorized Personnel Access Only. Access parameters monitored under system logging specifications.
        </div>
    </div>

    <script>
        // Toggle plain text / obscured text representation on password fields
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Prototype workflow route interception action script
        function handleFormSubmit(event) {
            event.preventDefault();
            // In development phase redirect directly to your newly built dashboard file:
            window.location.href = 'dashboard.html'; 
            return false;
        }
    </script>
</body>
</html>
