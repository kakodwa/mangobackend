{% load static %}
<!DOCTYPE html>
<html>
<head>
  <base href="{% static '' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <title>{% if share_title %}{{ share_title }}{% else %}MangoHub{% endif %}</title>
  <meta name="description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if share_title %}{{ share_title }}{% else %}MangoHub Marketplace{% endif %}">
  <meta property="og:description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">
  <meta property="og:image" content="{% if share_image %}{{ share_image }}{% else %}{% static 'icons/Icon-512.png' %}{% endif %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="{% if share_title %}{{ share_title }}{% else %}MangoHub Marketplace{% endif %}">
  <meta property="twitter:description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">
  <meta property="twitter:image" content="{% if share_image %}{{ share_image }}{% else %}{% static 'icons/Icon-512.png' %}{% endif %}">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MangoHub">
  <link rel="apple-touch-icon" href="{% static 'icons/Icon-192.png' %}">

  <link rel="icon" type="image/png" href="{% static 'favicon.png' %}"/>
  
   <script>
    // Enable client-side routing for deep links on web
    // This allows routes like /product/2, /shop/1, etc. to work properly
    (function() {
      console.log('[WebRouting] Initializing client-side routing handler');
      
      // Store the current path before Flutter loads
      const currentPath = window.location.pathname;
      const currentHash = window.location.hash;
      
      console.log('[WebRouting] Current path:', currentPath);
      console.log('[WebRouting] Current hash:', currentHash);
      
      // Handle path-based routing (e.g., /product/2)
      if (currentPath && currentPath !== '/' && !currentPath.includes('flutter')) {
        console.log('[WebRouting] Path detected, storing for app initialization');
        window.localStorage.setItem('deferred_deep_link', currentPath);
      }
      // Handle hash-based routing (e.g., /#/product/2)
      else if (currentHash && currentHash !== '#') {
        const hashPath = currentHash.replace('#', '');
        console.log('[WebRouting] Hash path detected, storing:', hashPath);
        window.localStorage.setItem('deferred_deep_link', hashPath);
      }
      
      // Prevent default SPA behavior for deep links
      window.addEventListener('popstate', function(event) {
        console.log('[WebRouting] Pop state detected:', event);
        const path = window.location.pathname;
        if (path && path !== '/' && !path.includes('flutter')) {
          console.log('[WebRouting] Storing popped path:', path);
          window.localStorage.setItem('deferred_deep_link', path);
          // Reload to let Flutter handle the routing
          window.location.reload();
        }
      });
    })();
  </script>
</head>
<body>
  <script src="{% static 'flutter_bootstrap.js' %}" async></script>
</body>
</html>
