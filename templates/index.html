{% load static %}
<!DOCTYPE html>
<html>
<head>
  <base href="{% static '' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <title>{% if share_title %}{{ share_title }}{% else %}MalaTrade{% endif %}</title>
  <meta name="description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if share_title %}{{ share_title }}{% else %}MangoHub Marketplace{% endif %}">
  <meta property="og:description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">
  <meta property="og:image" content="{% if share_image %}{{ share_image }}{% else %}{% static 'icons/Icon-512.png' %}{% endif %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="{% if share_title %}{{ share_title }}{% else %}MangoHub Marketplace{% endif %}">
  <meta property="twitter:description" content="{% if share_desc %}{{ share_desc }}{% else %}Explore products, shops, lodges, events, and properties on MangoHub.{% endif %}">
  <meta property="twitter:image" content="{% if share_image %}{{ share_image }}{% else %}{% static 'icons/Icon-512.png' %}{% endif %}">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MangoHub">
  <link rel="apple-touch-icon" href="{% static 'icons/Icon-192.png' %}">

  <link rel="icon" type="image/png" href="{% static 'img/icon/favicon.png' %}"/>
  <link rel="apple-touch-icon" sizes="57x57" href="{% static 'img/icon/apple-icon-57x57.png' %}">
  <link rel="apple-touch-icon" sizes="60x60" href="{% static 'img/icon/apple-icon-60x60.png' %}">
  <link rel="apple-touch-icon" sizes="72x72" href="{% static 'img/icon/apple-icon-72x72.png' %}">
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'img/icon/apple-icon-76x76.png' %}">
  <link rel="apple-touch-icon" sizes="114x114" href="{% static 'img/icon/apple-icon-114x114.png' %}">
  <link rel="apple-touch-icon" sizes="120x120" href="{% static 'img/icon/apple-icon-120x120.png' %}">
  <link rel="apple-touch-icon" sizes="152x152" href="{% static 'img/icon/apple-icon-152x152.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/icon/apple-icon-180x180.png' %}">
  <link rel="icon" type="image/png" sizes="192x192" href="{% static 'img/icon/android-icon-192x192.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/icon/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="96x96" href="{% static 'img/icon/favicon-96x96.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/icon/favicon-16x16.png' %}">

  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
  <meta name="theme-color" content="#FF8C00">

  <script>
    // Enable client-side routing for deep links on web
    (function() {
      console.log('[WebRouting] Initializing client-side routing handler');
      const currentPath = window.location.pathname;
      const currentHash = window.location.hash;
      
      if (currentPath && currentPath !== '/' && !currentPath.includes('flutter')) {
        window.localStorage.setItem('deferred_deep_link', currentPath);
      } else if (currentHash && currentHash !== '#') {
        const hashPath = currentHash.replace('#', '');
        window.localStorage.setItem('deferred_deep_link', hashPath);
      }
      
      window.addEventListener('popstate', function(event) {
        const path = window.location.pathname;
        if (path && path !== '/' && !path.includes('flutter')) {
          window.localStorage.setItem('deferred_deep_link', path);
          window.location.reload();
        }
      });
    })();
  </script>
</head>
<body>
  <script src="{% static 'flutter_bootstrap.js' %}" async></script>

  <!-- PWA INSTALLATION HANDLER -->
  <script>
    let deferredPrompt = null;
    window.isPwaInstallAvailable = false; // Persistent flag for Flutter initState check

    // Triggered when browser verifies PWA installation criteria
    window.addEventListener('beforeinstallprompt', (event) => {
      console.log('[PWA] Install prompt available');
      event.preventDefault();
      deferredPrompt = event;
      window.isPwaInstallAvailable = true; // Set flag immediately

      // Dispatch custom event for Flutter listener
      window.dispatchEvent(new CustomEvent('pwaInstallAvailable'));
    });

    // Directly callable by Flutter
    window.installApp = async function() {
      console.log('[PWA] Install requested from Flutter');

      if (!deferredPrompt) {
        console.log('[PWA] Deferred prompt unavailable or already consumed');
        return;
      }

      deferredPrompt.prompt();

      const result = await deferredPrompt.userChoice;
      console.log('[PWA] User choice outcome:', result.outcome);

      deferredPrompt = null;
      window.isPwaInstallAvailable = false;

      // Notify Flutter to hide the button
      window.dispatchEvent(new CustomEvent('pwaInstalled'));
    };

    // Detect when app gets successfully installed
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App successfully installed');
      deferredPrompt = null;
      window.isPwaInstallAvailable = false;
      window.dispatchEvent(new CustomEvent('pwaInstalled'));
    });
  </script>
</body>
</html>
